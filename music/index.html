<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Chakshu Jain music dashboard: now playing, recent tracks, top artists, listening clock, and total scrobbles.">
<title>Chakshu Jain — Music</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #080808;
    --surface: #0d0d0d;
    --border: #1e1e1e;
    --accent: #00e5ff;
    --accent-dim: rgba(0,229,255,0.07);
    --text: #f0f0f0;
    --muted: #aaa;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  a:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,8,8,0.93);
    backdrop-filter: blur(16px);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-title {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .nav-link {
    text-decoration: none;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color .2s;
  }

  .nav-link:hover { color: var(--accent); }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 48px;
  }

  .header {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .panel {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .panel-title {
    font-size: 9px;
    color: var(--accent);
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .now-main {
    display: grid;
    grid-template-columns: 132px 1fr;
    gap: 20px;
    align-items: center;
  }

  .now-art {
    width: 132px;
    height: 132px;
    border: 1px solid var(--border);
    background: #111;
    overflow: hidden;
  }

  .now-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .now-track {
    font-family: var(--display);
    font-size: 26px;
    line-height: 1.15;
    margin-bottom: 6px;
  }

  .now-artist {
    color: var(--muted);
    margin-bottom: 14px;
  }

  .now-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-pill {
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
    background: var(--accent-dim);
    padding: 4px 8px;
  }

  .eq {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
  }

  .eq-bar {
    width: 3px;
    border-radius: 1px;
    background: var(--accent);
    animation: eqb .8s ease-in-out infinite;
  }

  .spotify-link {
    text-decoration: none;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    transition: color .2s;
  }

  .spotify-link:hover { color: var(--accent); }

  .metrics {
    display: grid;
    gap: 10px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  .metric-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .metric-key {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .08em;
  }

  .metric-val {
    font-family: var(--display);
    color: var(--accent);
    font-size: 20px;
  }

  .section {
    margin-top: 24px;
  }

  .section-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .section-num {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: .15em;
  }

  .section-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .tracks-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    border: 1px solid var(--border);
    background: var(--border);
  }

  .track-card {
    background: var(--surface);
    text-decoration: none;
    color: inherit;
    transition: background .2s;
    min-width: 0;
  }

  .track-card:hover { background: #111; }

  .track-art {
    width: 100%;
    aspect-ratio: 1;
    background: #111;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .track-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .track-body {
    padding: 10px;
  }

  .track-name {
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .track-artist {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .artists {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    display: grid;
    gap: 10px;
  }

  .artist-row {
    text-decoration: none;
    color: inherit;
    display: grid;
    grid-template-columns: 150px 1fr 56px;
    gap: 12px;
    align-items: center;
  }

  .artist-name {
    color: var(--text);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .artist-bar-wrap {
    height: 10px;
    border: 1px solid var(--border);
    background: #0a0a0a;
  }

  .artist-bar {
    height: 100%;
    background: linear-gradient(90deg, rgba(0,229,255,0.28), rgba(0,229,255,0.88));
  }

  .artist-count {
    color: var(--muted);
    font-size: 10px;
    text-align: right;
  }

  .empty {
    color: var(--muted);
    font-size: 12px;
  }
  .status-line {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    min-height: 14px;
  }
  .signal-bars {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 10px;
    flex-shrink: 0;
  }
  .signal-bar {
    display: block;
    width: 3px;
    height: 4px;
    background: var(--accent);
    border-radius: 1px;
    animation: eqb .8s ease-in-out infinite;
  }
  .signal-bar:nth-child(2) { animation-delay: 0.12s; }
  .signal-bar:nth-child(3) { animation-delay: 0.24s; }

  @keyframes eqb {
    0%,100%{height:4px}
    50%{height:14px}
  }

  @media (max-width: 900px) {
    .container { padding: 24px; }
    nav { padding: 16px 24px; }
    .header { grid-template-columns: 1fr; }
    .tracks-grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 640px) {
    .now-main { grid-template-columns: 1fr; }
    .now-art { width: 100%; height: auto; aspect-ratio: 1; }
    .tracks-grid { grid-template-columns: repeat(2, 1fr); }
    .artist-row { grid-template-columns: 1fr; gap: 6px; }
    .artist-count { text-align: left; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-title">/music</div>
  <a class="nav-link" href="/">back to chakshu.dev</a>
</nav>

<main class="container">
  <section class="header">
    <article class="panel">
      <div class="panel-title">Now playing</div>
      <div class="now-main">
        <div class="now-art" id="nowArt"></div>
        <div>
          <div class="now-track" id="nowTrack">Loading...</div>
          <div class="now-artist" id="nowArtist">—</div>
          <div class="now-meta">
            <span class="live-pill" id="nowState">syncing</span>
            <div class="eq" id="nowEq"></div>
            <a class="spotify-link" id="nowLink" href="#" target="_blank" rel="noopener noreferrer">open in spotify ↗</a>
          </div>
          <div class="status-line" id="nowStatus"><span class="signal-bars" aria-hidden="true"><i class="signal-bar"></i><i class="signal-bar"></i><i class="signal-bar"></i></span>syncing recent track...</div>
        </div>
      </div>
    </article>

    <article class="panel">
      <div class="panel-title">Metrics</div>
      <div class="metrics">
        <div class="metric-row">
          <span class="metric-key">total_scrobbles</span>
          <span class="metric-val" id="scrobbleCount">—</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">listening_clock</span>
          <span class="metric-val" id="listenClock">—:—</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">top_artist_7d</span>
          <span class="metric-val" id="topArtist">—</span>
        </div>
      </div>
    </article>
  </section>

  <section class="section">
    <div class="section-head">
      <span class="section-num">01</span>
      <h2 class="section-title">Recent Tracks</h2>
      <div class="section-line"></div>
    </div>
    <div class="tracks-grid" id="tracksGrid">
      <div class="status-line"><span class="signal-bars" aria-hidden="true"><i class="signal-bar"></i><i class="signal-bar"></i><i class="signal-bar"></i></span>syncing recent tracks...</div>
    </div>
    <div class="status-line" id="tracksStatus"></div>
  </section>

  <section class="section">
    <div class="section-head">
      <span class="section-num">02</span>
      <h2 class="section-title">Top Artists</h2>
      <div class="section-line"></div>
    </div>
    <div class="artists" id="artistsList">
      <div class="status-line"><span class="signal-bars" aria-hidden="true"><i class="signal-bar"></i><i class="signal-bar"></i><i class="signal-bar"></i></span>syncing weekly artists...</div>
    </div>
    <div class="status-line" id="artistsStatus"></div>
  </section>
</main>

<script>
const LASTFM_USER = 'chakshujain';
const LASTFM_KEY = 'da674b2d8f3e39ba0cdfb7ae5e8a4629';
const LASTFM_BASE = 'https://ws.audioscrobbler.com/2.0/';

function lastFmUrl(method, params = {}) {
  const p = new URLSearchParams({
    method,
    user: LASTFM_USER,
    api_key: LASTFM_KEY,
    format: 'json',
    ...params
  });
  return `${LASTFM_BASE}?${p.toString()}`;
}

function spotifySearch(term) {
  return `https://open.spotify.com/search/${encodeURIComponent(term)}`;
}

function statusMessage(kind) {
  if (kind === 'timeout') return 'Last.fm took too long. Music feed will retry in 30s.';
  if (kind === 'rate') return 'Rate limit hit. Last.fm needs a minute. Retrying in 30s.';
  if (kind === 'empty') return 'No scrobbles returned right now. Probably API nap time.';
  return 'Music service unreachable. Retrying quietly in the background.';
}

function classifyMusicError(err) {
  if (err?.name === 'AbortError') return 'timeout';
  if (err?.status === 429) return 'rate';
  return 'offline';
}

async function fetchLastFm(method, params = {}, timeoutMs = 9000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(lastFmUrl(method, params), { signal: controller.signal });
    if (!res.ok) {
      const err = new Error(`http_${res.status}`);
      err.status = res.status;
      throw err;
    }
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

function setClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('listenClock').textContent = `${hh}:${mm}`;
}

function renderEqBars() {
  const eq = document.getElementById('nowEq');
  [0, 0.15, 0.3, 0.1].forEach((delay) => {
    const b = document.createElement('div');
    b.className = 'eq-bar';
    b.style.animationDelay = `${delay}s`;
    eq.appendChild(b);
  });
}

async function loadNowPlaying() {
  const nowStatus = document.getElementById('nowStatus');
  try {
    const data = await fetchLastFm('user.getrecenttracks', { limit: '1' });
    const track = data?.recenttracks?.track?.[0];
    if (!track) throw new Error('empty');

    const name = track?.name || 'Unknown track';
    const artist = track?.artist?.['#text'] || 'Unknown artist';
    const isLive = track?.['@attr']?.nowplaying === 'true';

    document.getElementById('nowTrack').textContent = name;
    document.getElementById('nowArtist').textContent = artist;
    document.getElementById('nowState').textContent = isLive ? 'now playing' : 'last played';
    document.getElementById('nowLink').href = spotifySearch(`${name} ${artist}`);
    document.getElementById('nowEq').style.display = isLive ? 'flex' : 'none';

    const imgSrc = track?.image?.find((img) => img?.size === 'extralarge')?.['#text']
      || track?.image?.find((img) => img?.size === 'large')?.['#text']
      || track?.image?.find((img) => img?.size === 'medium')?.['#text'];
    const hasImg = imgSrc && !imgSrc.includes('2a96cbd8b46e442fc41c2b86b821562f');
    const nowArt = document.getElementById('nowArt');
    if (hasImg) {
      nowArt.innerHTML = `<img src="${imgSrc}" alt="Album art for ${name}">`;
    } else {
      nowArt.innerHTML = '';
    }
    if (nowStatus) {
      nowStatus.innerHTML = isLive
        ? '<span class="signal-bars" aria-hidden="true"><i class="signal-bar"></i><i class="signal-bar"></i><i class="signal-bar"></i></span>live signal locked.'
        : 'Nothing live right now. Showing last played.';
    }
  } catch (err) {
    const kind = err?.message === 'empty' ? 'empty' : classifyMusicError(err);
    if (nowStatus) nowStatus.textContent = statusMessage(kind);
  }
}

async function loadRecentTracks() {
  const grid = document.getElementById('tracksGrid');
  const tracksStatus = document.getElementById('tracksStatus');
  try {
    const data = await fetchLastFm('user.getrecenttracks', { limit: '25' });
    const tracks = data?.recenttracks?.track || [];
    if (!tracks.length) throw new Error('empty');
    grid.innerHTML = '';

    tracks.slice(0, 25).forEach((track) => {
      const name = track?.name || 'Unknown track';
      const artist = track?.artist?.['#text'] || 'Unknown artist';
      const imgSrc = track?.image?.find((img) => img?.size === 'large')?.['#text']
        || track?.image?.find((img) => img?.size === 'medium')?.['#text'];
      const hasImg = imgSrc && !imgSrc.includes('2a96cbd8b46e442fc41c2b86b821562f');

      const card = document.createElement('a');
      card.className = 'track-card';
      card.href = spotifySearch(`${name} ${artist}`);
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      card.innerHTML = `
        <div class="track-art">${hasImg ? `<img src="${imgSrc}" alt="Album art for ${name}">` : ''}</div>
        <div class="track-body">
          <div class="track-name">${name.replace(/</g, '&lt;')}</div>
          <div class="track-artist">${artist.replace(/</g, '&lt;')}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    if (tracksStatus) tracksStatus.textContent = 'recent tracks synced.';
  } catch (err) {
    const kind = err?.message === 'empty' ? 'empty' : classifyMusicError(err);
    if (!grid.children.length) {
      grid.innerHTML = '<div class="empty">Recent tracks will appear once Last.fm responds.</div>';
    }
    if (tracksStatus) tracksStatus.textContent = statusMessage(kind);
  }
}

async function loadTopArtists() {
  const list = document.getElementById('artistsList');
  const artistsStatus = document.getElementById('artistsStatus');
  try {
    const data = await fetchLastFm('user.gettopartists', { limit: '7', period: '7day' });
    const artists = data?.topartists?.artist || [];
    if (!artists.length) throw new Error('empty');
    list.innerHTML = '';

    const maxPlays = Math.max(...artists.map((a) => Number(a.playcount || 0)), 1);
    const top = artists[0]?.name || '—';
    document.getElementById('topArtist').textContent = top;

    artists.slice(0, 7).forEach((artist) => {
      const name = artist?.name || 'Unknown artist';
      const plays = Number(artist?.playcount || 0);
      const width = Math.max(8, Math.round((plays / maxPlays) * 100));

      const row = document.createElement('a');
      row.className = 'artist-row';
      row.href = spotifySearch(name);
      row.target = '_blank';
      row.rel = 'noopener noreferrer';

      row.innerHTML = `
        <div class="artist-name">${name.replace(/</g, '&lt;')}</div>
        <div class="artist-bar-wrap"><div class="artist-bar" style="width:${width}%"></div></div>
        <div class="artist-count">${plays}</div>
      `;
      list.appendChild(row);
    });
    if (artistsStatus) artistsStatus.textContent = 'weekly artist profile synced.';
  } catch (err) {
    const kind = err?.message === 'empty' ? 'empty' : classifyMusicError(err);
    if (!list.children.length) {
      list.innerHTML = '<div class="empty">Top artists will appear once Last.fm responds.</div>';
    }
    if (artistsStatus) artistsStatus.textContent = statusMessage(kind);
  }
}

async function loadScrobbles() {
  try {
    const data = await fetchLastFm('user.getinfo');
    const count = data?.user?.playcount;
    if (count) {
      document.getElementById('scrobbleCount').textContent = Number(count).toLocaleString();
    }
  } catch (_) {}
}

renderEqBars();
setClock();
setInterval(setClock, 30000);

loadNowPlaying();
setInterval(loadNowPlaying, 30000);

loadRecentTracks();
setInterval(loadRecentTracks, 120000);

loadTopArtists();
setInterval(loadTopArtists, 300000);

loadScrobbles();
setInterval(loadScrobbles, 600000);
</script>
</body>
</html>
